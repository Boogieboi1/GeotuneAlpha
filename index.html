<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoTune 3D configurator</title>

  <!-- Plausible -->
  <script defer data-domain="jouwdomein.nl" src="https://plausible.io/js/script.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #050505, #000000);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    .container img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      color: #ffffff;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Geotune.png" alt="Geotune afbeelding" />
    <h1>3D configurator</h1>
    <p>Coming soon!</p>
  </div>
</body>
</html>
